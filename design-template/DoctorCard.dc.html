<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="display:flex;flex-direction:column;background:#FFFFFF;border:1px solid #E2E8F0;border-radius:16px;padding:20px;box-shadow:0 4px 20px rgba(15,23,42,0.06);transition:transform .18s ease, box-shadow .18s ease;height:100%;box-sizing:border-box" style-hover="transform:translateY(-4px);box-shadow:0 12px 28px rgba(15,23,42,0.10)">
  <div style="display:flex;align-items:flex-start;gap:14px">
    <div style="width:56px;height:56px;border-radius:14px;flex-shrink:0;overflow:hidden;background:{{ toneBg }};position:relative;display:flex;align-items:center;justify-content:center">
      <span style="font-family:'Baloo Da 2',cursive;font-size:22px;font-weight:600;color:{{ toneFg }}">{{ initials }}</span>
      <div style="position:absolute;inset:0"><x-import component-from-global-scope="image-slot" from="./image-slot.js" id="{{ slotId }}" src="{{ photo }}" shape="rounded" radius="14" placeholder="ছবি" fit="cover" hint-size="56px,56px"></x-import></div>
    </div>
    <div style="flex:1;min-width:0">
      <div style="font-family:'Baloo Da 2',cursive;font-weight:600;font-size:17px;color:#0F172A;line-height:1.3">{{ name }}</div>
      <div style="color:#0D9488;font-size:14px;font-weight:600;margin-top:2px">{{ specialty }}</div>
    </div>
    <sc-if value="{{ featured }}" hint-placeholder-val="{{ true }}">
      <span style="flex-shrink:0;background:#FEF3C7;color:#B45309;font-size:11px;font-weight:700;padding:4px 9px;border-radius:999px;display:inline-flex;align-items:center;gap:4px">★ ফিচার্ড</span>
    </sc-if>
  </div>
  <div style="color:#475569;font-size:13px;margin-top:12px;line-height:1.5;min-height:38px">{{ degrees }}</div>
  <div style="display:flex;flex-direction:column;gap:6px;margin-top:10px;padding-top:12px;border-top:1px solid #E2E8F0">
    <div style="display:flex;align-items:center;gap:7px;color:#475569;font-size:13.5px"><span style="color:#0D9488;font-size:13px">◉</span>{{ chamber }}, {{ area }}</div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:2px">
      <div style="display:flex;align-items:center;gap:4px;font-size:14px;font-weight:600;color:#0F172A"><span style="color:#FBBF24">★</span>{{ rating }}<span style="color:#94A3B8;font-weight:400;font-size:12.5px">({{ reviews }})</span></div>
      <div style="font-size:14px;color:#0F172A;font-weight:600">ফি {{ fee }} টাকা</div>
    </div>
  </div>
  <div style="display:flex;gap:8px;margin-top:16px">
    <button onClick="{{ onDetail }}" style="flex:1;padding:10px 12px;border-radius:10px;border:1.5px solid #0D9488;background:#FFFFFF;color:#0F766E;font-family:'Hind Siliguri',sans-serif;font-weight:600;font-size:14px;cursor:pointer;transition:background .15s" style-hover="background:#F0FDFA">বিস্তারিত</button>
    <button onClick="{{ onBook }}" style="flex:1;padding:10px 12px;border-radius:10px;border:none;background:#22C55E;color:#FFFFFF;font-family:'Hind Siliguri',sans-serif;font-weight:700;font-size:14px;cursor:pointer;transition:background .15s" style-hover="background:#16A34A">অ্যাপয়েন্টমেন্ট</button>
    <a href="tel:01774739914" style="width:42px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-radius:10px;background:#FFF7ED;color:#F97316;text-decoration:none;font-size:18px;border:1.5px solid #FED7AA" aria-label="কল করুন">✆</a>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:340,&quot;height&quot;:270},&quot;doctor&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;any&quot;},&quot;onDetail&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;},&quot;onBook&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const d = this.props.doctor || {};
    return {
      name: d.name ?? 'ডা. মোঃ রফিকুল ইসলাম',
      specialty: d.specialty ?? 'স্নায়ুরোগ (নিউরোলজি)',
      degrees: d.degrees ?? 'এমবিবিএস, এফসিপিএস (নিউরোলজি), সহযোগী অধ্যাপক',
      chamber: d.chamber ?? 'নিরালা ক্লিনিক',
      area: d.area ?? 'বয়রা',
      fee: d.fee ?? '৮০০',
      rating: d.rating ?? '৪.৮',
      reviews: d.reviews ?? '১২০',
      initials: d.initials ?? 'রই',
      slotId: d.slotId ?? 'doc-x',
      photo: d.photo ?? '',
      featured: d.featured ?? false,
      toneBg: d.toneBg ?? '#F0FDFA',
      toneFg: d.toneFg ?? '#0F766E',
      onDetail: this.props.onDetail || (() => {}),
      onBook: this.props.onBook || (() => {}),
    };
  }
}
</script>
</body>
</html>
